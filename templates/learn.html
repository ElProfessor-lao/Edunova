<!DOCTYPE html>
<html>
<head>
    <title>EduNova - Learn Life Skills | Apprendre les Compétences de Vie</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .app { max-width: 1000px; margin: 0 auto; }
        .header {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo { font-size: 28px; font-weight: bold; color: #667eea; }
        .lang-switch {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .lang-btn {
            background: #f0f0f0;
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        .lang-btn:hover:not(.active) {
            background: #e0e0e0;
        }
        .stats { display: flex; gap: 15px; }
        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 10px 15px;
            border-radius: 10px;
            text-align: center;
            min-width: 80px;
        }
        .stat-value { font-size: 20px; font-weight: bold; }
        .stat-label { font-size: 11px; }
        .categories {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }
        .category-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            text-align: center;
            transition: transform 0.2s;
        }
        .category-card:hover { transform: translateY(-5px); }
        .category-icon { font-size: 48px; margin-bottom: 10px; }
        .category-name { font-size: 20px; font-weight: bold; margin-bottom: 10px; color: #333; }
        .category-desc { color: #666; font-size: 14px; }
        .lessons-view, .lesson-view {
            background: white;
            border-radius: 15px;
            padding: 20px;
        }
        .back-btn {
            background: #666;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .back-btn:hover { background: #555; }
        .lesson-card {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            border-left: 4px solid #667eea;
            transition: transform 0.2s;
        }
        .lesson-card:hover { transform: translateX(5px); }
        .lesson-card.completed { border-left-color: #4CAF50; background: #e8f5e9; }
        .lesson-title { font-weight: bold; margin-bottom: 5px; color: #333; }
        .lesson-status { font-size: 12px; color: #666; }
        .hidden { display: none; }
        
        /* Video Container */
        .video-container {
            margin: 20px 0;
            border-radius: 15px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .video-container video {
            width: 100%;
            max-height: 400px;
            display: block;
        }
        .video-caption {
            padding: 10px;
            background: #f0f0f0;
            text-align: center;
            font-size: 14px;
            color: #666;
        }
        
        /* Content Styles */
        .key-points {
            background: #e8f4f8;
            padding: 15px;
            border-radius: 10px;
            margin: 15px 0;
        }
        .key-points ul { margin-left: 20px; }
        .key-points li { margin: 8px 0; line-height: 1.4; }
        .lesson-content-text p { margin: 15px 0; line-height: 1.6; }
        .example {
            background: #f0f0f0;
            padding: 10px;
            border-radius: 8px;
            margin: 10px 0;
        }
        .example-bad { color: #dc3545; }
        .example-good { color: #28a745; }
        
        /* Practice Area */
        .practice-area {
            background: #fff3e0;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }
        .option-btn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 12px;
            margin: 8px 0;
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .option-btn:hover {
            border-color: #667eea;
            background: #f0f0ff;
            transform: translateX(5px);
        }
        .option-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .feedback {
            padding: 12px;
            border-radius: 8px;
            margin: 15px 0;
            line-height: 1.5;
        }
        .feedback-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .feedback-error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .progress-bar {
            background: #e0e0e0;
            height: 10px;
            border-radius: 5px;
            overflow: hidden;
            margin: 15px 0;
        }
        .progress-fill { background: #4CAF50; height: 100%; transition: width 0.3s ease; }
        .xp-gain { animation: xpPop 0.5s ease; }
        @keyframes xpPop {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); color: #ffd700; }
        }
        h1 { color: #333; margin-bottom: 20px; }
        h3 { margin: 15px 0 10px 0; color: #333; }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">🌟 EduNova</div>
            <div class="lang-switch">
                <button class="lang-btn active" data-lang="en" onclick="switchLanguage('en')">🇬🇧 English</button>
                <button class="lang-btn" data-lang="fr" onclick="switchLanguage('fr')">🇫🇷 Français</button>
            </div>
            <div class="stats">
                <div class="stat-card"><div class="stat-value" id="xp">0</div><div class="stat-label" id="xpLabel">XP</div></div>
                <div class="stat-card"><div class="stat-value" id="lessonsCount">0/0</div><div class="stat-label" id="lessonsLabel">Lessons</div></div>
                <div class="stat-card"><div class="stat-value" id="progressPercent">0%</div><div class="stat-label" id="completeLabel">Complete</div></div>
            </div>
        </div>
        
        <div id="categoriesView"><div class="categories" id="categoriesGrid">Loading...</div></div>
        
        <div id="lessonsView" class="hidden">
            <button class="back-btn" id="backToCategoriesBtn" onclick="showCategories()">← Back to Categories</button>
            <div class="lessons-view"><h2 id="categoryTitle"></h2><div id="lessonsList"></div></div>
        </div>
        
        <div id="lessonView" class="hidden">
            <button class="back-btn" id="backToLessonsBtn" onclick="showLessons()">← Back to Lessons</button>
            <div class="lesson-view" id="lessonContent"></div>
        </div>
    </div>
    
    <script>
        let currentCategory = null;
        let currentLesson = null;
        let currentLang = 'en';
        
        const translations = {
            en: { xpLabel: 'XP', lessonsLabel: 'Lessons', completeLabel: 'Complete', backToCategories: '← Back to Categories', backToLessons: '← Back to Lessons', loading: 'Loading...', keyTakeaways: '📌 Key Takeaways:', examples: '📖 Examples:', practiceQuestions: '🎯 Practice Questions', lessonComplete: '✅ Lesson Complete!', masteredLesson: '✅ You\'ve mastered this lesson!', noExamples: 'No examples available.', redirecting: 'Returning to lessons list...' },
            fr: { xpLabel: 'XP', lessonsLabel: 'Leçons', completeLabel: 'Complété', backToCategories: '← Retour aux Catégories', backToLessons: '← Retour aux Leçons', loading: 'Chargement...', keyTakeaways: '📌 Points Clés :', examples: '📖 Exemples :', practiceQuestions: '🎯 Questions de Pratique', lessonComplete: '✅ Leçon Complétée !', masteredLesson: '✅ Vous avez maîtrisé cette leçon !', noExamples: 'Aucun exemple disponible.', redirecting: 'Retour à la liste des leçons...' }
        };
        
        function t(key) { return translations[currentLang][key] || key; }
        
        function updateUILanguage() {
            document.getElementById('xpLabel').textContent = t('xpLabel');
            document.getElementById('lessonsLabel').textContent = t('lessonsLabel');
            document.getElementById('completeLabel').textContent = t('completeLabel');
            document.getElementById('backToCategoriesBtn').textContent = t('backToCategories');
            document.getElementById('backToLessonsBtn').textContent = t('backToLessons');
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === currentLang);
            });
        }
        
        async function switchLanguage(lang) {
            currentLang = lang;
            updateUILanguage();
            if (currentCategory && !document.getElementById('categoriesView').classList.contains('hidden')) {
                await loadCategories();
            } else if (currentCategory && !document.getElementById('lessonsView').classList.contains('hidden')) {
                await loadLessons(currentCategory);
            } else if (currentLesson && !document.getElementById('lessonView').classList.contains('hidden')) {
                await loadLesson(currentLesson.id);
            } else {
                await loadCategories();
            }
        }
        
        async function loadCategories() {
            try {
                const res = await fetch('/api/init');
                const data = await res.json();
                displayCategories(data.categories || []);
                if (data.stats) updateStats(data.stats);
            } catch(e) {
                document.getElementById('categoriesGrid').innerHTML = `<p style="color:red;">Error: ${e.message}</p>`;
            }
        }
        
        function displayCategories(categories) {
            const grid = document.getElementById('categoriesGrid');
            if (!categories.length) { grid.innerHTML = '<p>No categories found</p>'; return; }
            grid.innerHTML = categories.map(cat => `
                <div class="category-card" onclick="loadLessons('${cat.name}')">
                    <div class="category-icon">${cat.icon || '📚'}</div>
                    <div class="category-name">${cat.name}</div>
                    <div class="category-desc">${cat.description || ''}</div>
                </div>
            `).join('');
        }
        
        async function loadLessons(categoryName) {
            window.scrollTo({ top: 0, behavior: 'instant' });
            currentCategory = categoryName;
            try {
                const res = await fetch(`/api/category/${encodeURIComponent(categoryName)}?lang=${currentLang}`);
                const data = await res.json();
                document.getElementById('categoryTitle').innerHTML = `${categoryName} ${currentLang === 'fr' ? 'Leçons' : 'Lessons'}`;
                const list = document.getElementById('lessonsList');
                list.innerHTML = data.lessons.map((lesson, idx) => `
                    <div class="lesson-card ${lesson.completed ? 'completed' : ''}" onclick="loadLesson('${lesson.id}')">
                        <div class="lesson-title">${idx+1}. ${currentLang === 'fr' && lesson.title_fr ? lesson.title_fr : lesson.title_en}</div>
                        <div class="lesson-status">${lesson.completed ? (currentLang === 'fr' ? '✅ Complété' : '✅ Completed') : (currentLang === 'fr' ? '📖 Non commencé' : '📖 Not started')}</div>
                    </div>
                `).join('');
                showLessons();
            } catch(e) { alert('Error: ' + e.message); }
        }
        
        async function loadLesson(lessonId) {
            window.scrollTo({ top: 0, behavior: 'instant' });
            try {
                const res = await fetch(`/api/lesson/${lessonId}?lang=${currentLang}`);
                const data = await res.json();
                if (data.stats) updateStats(data.stats);
                
                currentLesson = data.lesson;
                const completed = data.completed;
                const completedQuestions = data.completed_questions || [];
                const questions = currentLesson.practice_questions || [];
                const answeredCount = completedQuestions.length;
                const totalCount = questions.length;
                
                // Video HTML
                const videoUrl = currentLesson.video_url || null;
                const videoHtml = videoUrl ? `
                    <div class="video-container">
                        <video controls preload="metadata">
                            <source src="${videoUrl}" type="video/mp4">
                            ${currentLang === 'fr' ? 'Votre navigateur ne supporte pas la lecture vidéo.' : 'Your browser does not support the video tag.'}
                        </video>
                        <div class="video-caption">🎬 ${currentLang === 'fr' ? 'Regardez cette courte vidéo pour en apprendre davantage' : 'Watch this short video to learn more'}</div>
                    </div>
                ` : '';
                
                let practiceHtml = '';
                if (questions.length > 0 && !completed) {
                    let unansweredIndex = 0;
                    while (completedQuestions.includes(unansweredIndex) && unansweredIndex < totalCount) unansweredIndex++;
                    if (unansweredIndex < totalCount) {
                        const q = questions[unansweredIndex];
                        const qText = currentLang === 'fr' ? q.question_fr : q.question_en;
                        const qOptions = currentLang === 'fr' ? q.options_fr : q.options_en;
                        practiceHtml = `
                            <div class="practice-area">
                                <h3>${t('practiceQuestions')}</h3>
                                <div class="progress-bar"><div class="progress-fill" style="width: ${(answeredCount/totalCount)*100}%"></div></div>
                                <p><strong>${currentLang === 'fr' ? 'Question' : 'Question'} ${answeredCount+1} ${currentLang === 'fr' ? 'de' : 'of'} ${totalCount}:</strong></p>
                                <p style="margin: 15px 0; font-size: 16px;">${escapeHtml(qText)}</p>
                                ${qOptions.map((opt, idx) => `<button class="option-btn" onclick="checkPractice(${unansweredIndex}, ${idx})">${String.fromCharCode(65+idx)}. ${escapeHtml(opt)}</button>`).join('')}
                                <div id="practiceFeedback"></div>
                            </div>
                        `;
                    }
                } else if (completed) {
                    practiceHtml = `
                        <div class="practice-area">
                            <h3>${t('practiceQuestions')}</h3>
                            <div class="feedback feedback-success">
                                ✅ ${t('lessonComplete')}<br>
                                ${currentLang === 'fr' ? 'Vous avez répondu correctement à toutes les questions !' : 'You answered all questions correctly!'}
                            </div>
                        </div>
                    `;
                }
                
                const title = currentLang === 'fr' ? currentLesson.title_fr : currentLesson.title_en;
                const content = currentLang === 'fr' ? currentLesson.content_fr : currentLesson.content_en;
                const keyPoints = currentLang === 'fr' ? currentLesson.key_points_fr : currentLesson.key_points_en;
                const examples = currentLesson.examples || [];
                const contentHtml = (content || '').split('\n\n').map(p => `<p>${escapeHtml(p)}</p>`).join('');
                
                document.getElementById('lessonContent').innerHTML = `
                    <h1>${escapeHtml(title)}</h1>
                    ${videoHtml}
                    <div class="lesson-content-text">${contentHtml}</div>
                    <div class="key-points">
                        <h3>${t('keyTakeaways')}</h3>
                        <ul>${(keyPoints || []).map(p => `<li>${escapeHtml(p)}</li>`).join('')}</ul>
                    </div>
                    <h3>${t('examples')}</h3>
                    ${examples.length > 0 ? examples.map(ex => `
                        <div class="example">
                            <div class="example-bad">❌ ${currentLang === 'fr' ? 'Au lieu de' : 'Instead of'}: "${escapeHtml(currentLang === 'fr' ? ex.bad_fr : ex.bad_en)}"</div>
                            <div class="example-good">✅ ${currentLang === 'fr' ? 'Essayez' : 'Try'}: "${escapeHtml(currentLang === 'fr' ? ex.good_fr : ex.good_en)}"</div>
                        </div>
                    `).join('') : `<p>${t('noExamples')}</p>`}
                    ${practiceHtml}
                    ${completed ? `<div class="feedback feedback-success" style="margin-top:15px;">✅ ${t('masteredLesson')}</div>` : ''}
                `;
                showLesson();
            } catch(e) { alert('Error: ' + e.message); }
        }
        
        async function checkPractice(qIndex, aIndex) {
            const btns = document.querySelectorAll('.option-btn');
            btns.forEach(btn => btn.disabled = true);
            try {
                const res = await fetch('/api/practice', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({lesson_id: currentLesson.id, question_index: qIndex, answer_index: aIndex})
                });
                const data = await res.json();
                document.getElementById('practiceFeedback').innerHTML = `<div class="feedback ${data.success ? 'feedback-success' : 'feedback-error'}">${(data.message || '').replace(/\n/g, '<br>')}</div>`;
                if (data.xp_earned > 0) {
                    document.getElementById('xp').classList.add('xp-gain');
                    setTimeout(() => document.getElementById('xp').classList.remove('xp-gain'), 500);
                }
                if (data.stats) updateStats(data.stats);
                
                if (data.lesson_completed) {
                    setTimeout(() => {
                        showLessons();
                        loadLessons(currentCategory);
                    }, 2000);
                } else if (data.question_completed) {
                    setTimeout(() => loadLesson(currentLesson.id), 1500);
                } else if (!data.success) {
                    btns.forEach(btn => btn.disabled = false);
                }
            } catch(e) {
                document.getElementById('practiceFeedback').innerHTML = `<div class="feedback feedback-error">Error: ${e.message}</div>`;
                btns.forEach(btn => btn.disabled = false);
            }
        }
        
        function updateStats(stats) {
            document.getElementById('xp').textContent = stats.xp || 0;
            document.getElementById('lessonsCount').textContent = `${stats.lessons_completed || 0}/${stats.total_lessons || 0}`;
            document.getElementById('progressPercent').textContent = `${Math.round(stats.progress_percent || 0)}%`;
        }
        
        function showCategories() {
            document.getElementById('categoriesView').classList.remove('hidden');
            document.getElementById('lessonsView').classList.add('hidden');
            document.getElementById('lessonView').classList.add('hidden');
            currentCategory = null;
            currentLesson = null;
            window.scrollTo({ top: 0, behavior: 'instant' });
        }
        
        function showLessons() {
            document.getElementById('categoriesView').classList.add('hidden');
            document.getElementById('lessonsView').classList.remove('hidden');
            document.getElementById('lessonView').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'instant' });
        }
        
        function showLesson() {
            document.getElementById('categoriesView').classList.add('hidden');
            document.getElementById('lessonsView').classList.add('hidden');
            document.getElementById('lessonView').classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'instant' });
        }
        
        function escapeHtml(text) { if (!text) return ''; const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
        
        loadCategories();
        updateUILanguage();
    </script>
</body>
</html>
